<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GZN Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    :root {
      --bg1: #07101f;
      --bg2: #0b1830;
      --card: rgba(15, 25, 48, 0.72);
      --stroke: rgba(72, 122, 255, 0.35);
      --stroke2: rgba(255,255,255,0.05);
      --blue: #2c6cff;
      --blue2: #4fa1ff;
      --text: #f5f7ff;
      --muted: #7f8ba8;
      --green: #17b26a;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(46,108,255,.22), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(0,163,255,.12), transparent 20%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--text);
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 460px 1fr;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(79,161,255,.8);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(79,161,255,.9);
      animation: floatUp linear infinite;
      opacity: .8;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0px);
        opacity: .15;
      }
      20% {
        opacity: .85;
      }
      to {
        transform: translateY(-140px);
        opacity: 0;
      }
    }

    .left {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 42px 36px 28px;
      border-right: 1px solid rgba(255,255,255,.04);
      background:
        linear-gradient(180deg, rgba(8,16,34,.68), rgba(5,12,24,.84));
      backdrop-filter: blur(14px);
      box-shadow: inset -1px 0 0 rgba(255,255,255,.03);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-badge {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #4a85ff, #2c6cff);
      box-shadow: 0 10px 30px rgba(44,108,255,.35);
      font-weight: 800;
      letter-spacing: .5px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .session-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      min-height: 84px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .avatar-wrap {
      position: relative;
      width: 56px;
      height: 56px;
      flex: 0 0 56px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.1);
      background: #0a1020;
    }

    .online-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      right: 0;
      bottom: 2px;
      border-radius: 50%;
      background: #00d26a;
      box-shadow: 0 0 12px rgba(0,210,106,.8);
      border: 2px solid #0b1428;
    }

    .session-meta small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .session-meta strong {
      font-size: 16px;
      font-weight: 800;
    }

    .input-card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 0 16px;
      height: 72px;
      border-radius: 18px;
      background: rgba(5,12,28,.6);
      border: 1px solid var(--stroke);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 22px rgba(44,108,255,.12);
      margin-bottom: 18px;
      transition: .2s;
    }

    .input-card:focus-within {
      border-color: rgba(79,161,255,.8);
      box-shadow:
        0 0 0 1px rgba(79,161,255,.2),
        0 0 28px rgba(44,108,255,.24);
      transform: translateY(-1px);
    }

    .input-icon {
      width: 24px;
      text-align: center;
      font-size: 18px;
      opacity: .9;
    }

    .input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-weight: 600;
    }

    .input::placeholder {
      color: #5f6e92;
      font-weight: 600;
    }

    .remember-row {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .remember-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember-row input {
      accent-color: var(--blue);
    }

    .link {
      color: #3c87ff;
      text-decoration: none;
    }

    .btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .3px;
      transition: .2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-discord {
      background: linear-gradient(180deg, #3774ff, #2457d8);
      box-shadow: 0 14px 30px rgba(44,108,255,.3);
      margin-bottom: 12px;
    }

    .btn-panel {
      background: linear-gradient(180deg, #182847, #111d34);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
      margin-bottom: 18px;
    }

    .small-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-top: 18px;
    }

    .ghost-btn {
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.02);
      color: #c8d5ff;
      font-weight: 800;
      cursor: pointer;
    }

    .right {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 60% 50%, rgba(44,108,255,.12), transparent 25%),
        #02050a;
    }

    .right::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5,10,20,.34) 0%, rgba(5,10,20,.08) 12%, rgba(0,0,0,0) 25%);
      z-index: 1;
      pointer-events: none;
    }

    .right-logo {
      position: relative;
      z-index: 2;
      max-width: 78%;
      max-height: 74%;
      object-fit: contain;
      filter:
        drop-shadow(0 0 16px rgba(43,116,255,.35))
        drop-shadow(0 0 40px rgba(35,98,255,.22));
      animation: logoPulse 2.8s ease-in-out infinite alternate;
      user-select: none;
      pointer-events: none;
    }

    @keyframes logoPulse {
      from {
        transform: translateY(0px) scale(1);
        filter:
          drop-shadow(0 0 10px rgba(43,116,255,.26))
          drop-shadow(0 0 30px rgba(35,98,255,.18));
      }
      to {
        transform: translateY(-4px) scale(1.015);
        filter:
          drop-shadow(0 0 18px rgba(43,116,255,.42))
          drop-shadow(0 0 50px rgba(35,98,255,.28));
      }
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 30;
      min-width: 320px;
      max-width: 420px;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17,99,63,.96), rgba(12,77,49,.96));
      border: 1px solid rgba(69,255,154,.18);
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      color: white;
      font-weight: 800;
    }

    .toast.show {
      display: flex;
      animation: toastIn .25s ease;
    }

    @keyframes toastIn {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.12);
      font-size: 16px;
    }

    .mini {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.4;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .right {
        display: none;
      }

      .left {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="app">
    <div class="left">
      <div class="brand">
        <div class="brand-badge">G</div>
        <div class="brand-name">GZN</div>
      </div>

      <div class="session-card">
        <div class="avatar-wrap">
          <img class="avatar" id="avatar" src="/img/default-avatar.png" alt="avatar">
          <div class="online-dot"></div>
        </div>
        <div class="session-meta">
          <small>SESSÃO ATIVA</small>
          <strong id="sessionName">Não Sincronizado</strong>
        </div>
      </div>

      <div class="input-card">
        <div class="input-icon">🔑</div>
        <input class="input" id="keyInput" type="text" placeholder="Digite sua key">
      </div>

      <div class="remember-row">
        <label>
          <input type="checkbox" id="rememberKey" checked>
          LEMBRAR KEY
        </label>
        <a class="link" href="/admin" target="_blank">PAINEL ADMIN</a>
      </div>

      <button class="btn btn-discord" onclick="loginDiscord()">ENTRAR COM DISCORD</button>
      <button class="btn btn-panel" onclick="entrarPainel()">ENTRAR NO PAINEL</button>

      <div class="mini">
        Faça o Login no Discord Primeiro, Depois Cole sua Key e Entre no Painel.
      </div>

      <div class="small-actions">
        <button class="ghost-btn" onclick="window.open('https://discord.com', '_blank')">DISCORD</button>
        <button class="ghost-btn" onclick="window.open('/', '_self')">WEB</button>
      </div>
    </div>

    <div class="right">
      <img class="right-logo" src="/img/gzn.png" alt="GZN Logo">
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✔</div>
    <div>Discord Sincronizado com Sucesso!</div>
  </div>

  <script>
    const particlesWrap = document.getElementById("particles");
    for (let i = 0; i < 26; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "%";
      p.style.top = (20 + Math.random() * 80) + "%";
      p.style.animationDuration = (3 + Math.random() * 4) + "s";
      p.style.animationDelay = (Math.random() * 4) + "s";
      p.style.opacity = 0.25 + Math.random() * 0.7;
      particlesWrap.appendChild(p);
    }

    const keyInput = document.getElementById("keyInput");
    const rememberKey = document.getElementById("rememberKey");
    const toast = document.getElementById("toast");
    const sessionName = document.getElementById("sessionName");

    const savedKey = localStorage.getItem("gzn_key");
    if (savedKey) keyInput.value = savedKey;

    const savedName = localStorage.getItem("gzn_discord_name");
const savedAvatar = localStorage.getItem("gzn_discord_avatar");
const avatarImg = document.getElementById("avatar");

if (savedName) sessionName.textContent = savedName;
if (savedAvatar) avatarImg.src = savedAvatar;

    function loginDiscord() {
      window.location.href = "/login";
    }

    function showToast() {
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2600);
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (token) {
  localStorage.setItem("gzn_token", token);
  showToast();
  carregarSessaoDiscord(token);
}

    async function entrarPainel() {
      const finalToken = localStorage.getItem("gzn_token");
      const key = keyInput.value.trim();

      if (!finalToken) {
        alert("Faça Login com Discord Primeiro.");
        return;
      }

      if (!key) {
        alert("Digite sua Key.");
        return;
      }

      if (rememberKey.checked) {
        localStorage.setItem("gzn_key", key);
      } else {
        localStorage.removeItem("gzn_key");
      }

      try {
        const res = await fetch("/auth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: finalToken,
            key: key,
            hwid: "WEB-" + navigator.userAgent
          })
        });

        const data = await res.json();

        if (data.success) {
          alert("Login Realizado com Sucesso!");
        } else {
          alert(data.error || "Erro ao Entrar.");
        }
      } catch (e) {
        alert("Erro ao Conectar com o Servidor.");
      }
    }
  </script>
</body>
</html>
