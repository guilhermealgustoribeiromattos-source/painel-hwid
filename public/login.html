<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GZN Engine</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  height: 100vh;
  background: #000;
}

/* LADO ESQUERDO */
.left {
  width: 40%;
  background: linear-gradient(180deg, #0a1a3f, #050d1f);
  padding: 60px;
  color: white;
}

.title {
  font-size: 28px;
  margin-bottom: 30px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
  background: #0f1f4a;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #2f6bff;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #1f4ed8;
}

/* LADO DIREITO */
.right {
  width: 60%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* IMAGEM GZN */
.logo {
  max-width: 80%;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {
    filter: drop-shadow(0 0 10px #00aaff);
  }
  to {
    filter: drop-shadow(0 0 30px #00aaff);
  }
}
</style>

</head>

<body>

<div class="left">
  <div class="title">GZN ENGINE</div>

  <input type="text" id="key" placeholder="Digite sua key">

<button onclick="loginDiscord()">Entrar com Discord</button> <button onclick="entrar()">Entrar no Painel</button>

</div>

<div class="right">
  <img src="gzn.png" class="logo">
</div>

<script>
function loginDiscord() {
  window.location.href = "/login";
}

function entrar() {
  const key = document.getElementById("key").value;

  fetch("/api/licenses/check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ key })
  })
  .then(r => r.json())
  .then(data => {
    if(data.success) {
      alert("Login OK 🔥");
    } else {
      alert("Key inválida");
    }
  });
}
</script>

</body>
</html>
