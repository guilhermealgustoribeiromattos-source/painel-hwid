<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GZN Engine</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#08111f;
  color:white;
  display:flex;
  height:100vh;
}

.left {
  width:380px;
  padding:30px;
  background:linear-gradient(180deg,#081427,#091933);
}

.right {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo {
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar {
  width:40px;
  height:40px;
  border-radius:8px;
  background:#111;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:#0f1f3a;
  color:white;
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.discord {
  background:#3b82f6;
}

.enter {
  background:#1f2937;
}

img {
  max-width:600px;
}
</style>
</head>

<body>

<div class="left">
  <div class="logo">GZN ENGINE</div>

  <div class="card">
    <img id="avatar" class="avatar" src="">
    <div>
      <div style="font-size:12px;color:#aaa;">Sessão Ativa</div>
      <div id="username">Não Conectado</div>
    </div>
  </div>

  <input id="key" placeholder="Sua Key">

  <button class="btn discord" onclick="loginDiscord()">ENTRAR COM DISCORD</button>
  <button class="btn enter" onclick="entrar()">ENTRAR NO PAINEL</button>
</div>

<div class="right">
  <img src="gzn.png">
</div>

<script>
// 👉 botão discord
function loginDiscord(){
    window.location.href = "/login";
}

// 👉 pega token da URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if(token){
  fetch(`/session?token=${token}`)
  .then(r => r.json())
  .then(data => {
    if(data.success){
      document.getElementById("username").innerText = data.username;
      document.getElementById("avatar").src = data.avatar;
      localStorage.setItem("token", token);
    }
  });
}

// 👉 login final
function entrar(){
  const key = document.getElementById("key").value;
  const token = localStorage.getItem("token");

  if(!token){
    alert("Faça Login com Discord Primeiro!");
    return;
  }

  fetch("/auth", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      token: token,
      key: key,
      hwid: "WEB-USER"
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.success){
      alert("Logado com Sucesso");
    } else {
      alert(data.error);
    }
  });
}
</script>

</body>
</html>
